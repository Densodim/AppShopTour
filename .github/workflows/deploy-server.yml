name: Deploy Server To VDS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/appshoptour-server

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Run server tests
        uses: gradle/actions/setup-gradle@v4

      - name: Test server module
        run: ./gradlew :server:test

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Prepare SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VDS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.VDS_PORT }}" "${{ secrets.VDS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload compose file
        shell: bash
        run: |
          scp -P "${{ secrets.VDS_PORT }}" ./deploy/docker-compose.vds.yml "${{ secrets.VDS_USER }}@${{ secrets.VDS_HOST }}:${{ secrets.VDS_APP_DIR }}/docker-compose.yml"

      - name: Deploy on VDS
        shell: bash
        run: |
          ssh -p "${{ secrets.VDS_PORT }}" "${{ secrets.VDS_USER }}@${{ secrets.VDS_HOST }}" << EOF
          set -e
          cd "${{ secrets.VDS_APP_DIR }}"
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
          export SERVER_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker compose --env-file .env -f docker-compose.yml pull
          docker compose --env-file .env -f docker-compose.yml up -d
          docker image prune -f
          EOF
